<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Second Brain">
  <meta name="theme-color" content="#F5F4EF">
  <title>Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="manifest" href="/manifest.json">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #F5F4EF;
      --bg-card: #FFFFFF;
      --bg-tag: #F0EDE4;
      --bg-confirm: #EDEAE0;
      --bg-tag-confirmed: #D3D1C7;
      --text-primary: #2C2C2A;
      --text-secondary: #888780;
      --text-tertiary: #B4B2A9;
      --text-tag: #5F5E5A;
      --text-tag-confirmed: #444441;
      --border: rgba(0, 0, 0, 0.07);
      --border-card: rgba(0, 0, 0, 0.08);
      --border-input: rgba(0, 0, 0, 0.10);
      --font-serif: 'Lora', Georgia, serif;
      --font-sans: 'DM Sans', sans-serif;
      --radius-card: 12px;
      --radius-pill: 22px;
      --radius-tag: 20px;
      --radius-bubble: 16px;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      font-family: var(--font-sans);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100svh;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
    }

    #sidebar {
      display: none;
    }

    #main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }


    #auth-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #auth-overlay .brain-logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #E8E4D9;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    #auth-overlay h1 {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    #auth-overlay p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 36px;
      text-align: center;
      line-height: 1.5;
    }

    #auth-overlay .field-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    #auth-overlay input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-card);
      border: 0.5px solid var(--border-input);
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
    }

    #auth-overlay input::placeholder {
      color: var(--text-tertiary);
    }

    #auth-overlay input:focus {
      border-color: rgba(0, 0, 0, 0.2);
    }

    #auth-connect,
    #setup-submit {
      width: 100%;
      padding: 14px;
      background: var(--text-primary);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #auth-connect:active,
    #setup-submit:active {
      opacity: 0.8;
    }

    #auth-error {
      font-size: 13px;
      color: #c0392b;
      text-align: center;
      margin-top: 8px;
      min-height: 18px;
    }


    #topbar {
      display: flex;
      align-items: center;
      padding: 12px 16px 10px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .brain-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #E8E4D9;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-right: 10px;
    }

    .topbar-info {
      flex: 1;
      min-width: 0;
    }

    .topbar-name {
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .topbar-status {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.2;
    }

    .topbar-menu {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 20px;
      padding: 4px;
      display: flex;
      align-items: center;
    }


    #screens {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .screen {
      display: none;
      flex-direction: column;
      height: 100%;
      position: absolute;
      inset: 0;
    }

    .screen.active {
      display: flex;
    }


    #navbar {
      display: flex;
      border-top: 0.5px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      padding: 10px 0 18px;
    }



    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      color: var(--text-tertiary);
      transition: color 0.15s;
    }

    .nav-tab.active {
      color: var(--text-primary);
    }

    .nav-tab i {
      font-size: 20px;
    }

    .nav-tab span {
      font-size: 10px;
      font-family: var(--font-sans);
    }


    .memory-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border-card);
      border-radius: var(--radius-card);
      padding: 10px 13px;
      transition: opacity 0.3s, transform 0.3s;
    }

    .match-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .match-pct {
      font-size: 11px;
      color: var(--text-tertiary);
      flex-shrink: 0;
    }

    .match-bar-bg {
      flex: 1;
      height: 2px;
      background: #E8E6E0;
      border-radius: 2px;
      overflow: hidden;
    }

    .match-bar-fill {
      height: 100%;
      background: var(--text-secondary);
      border-radius: 2px;
    }

    .card-content {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    .tag-chip {
      background: var(--bg-tag);
      color: var(--text-tag);
      font-size: 11px;
      padding: 1px 7px;
      border-radius: var(--radius-tag);
      white-space: nowrap;
      font-family: var(--font-sans);
    }

    .card-actions {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .card-action-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 11px;
      font-family: var(--font-sans);
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 2px 0;
      transition: color 0.15s;
    }

    .card-action-btn:hover {
      color: var(--text-primary);
    }

    .card-action-btn i {
      font-size: 13px;
    }


    .bubble-row {
      display: flex;
      margin-bottom: 4px;
    }

    .bubble-row.user {
      justify-content: flex-end;
    }

    .bubble-row.brain {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 84%;
      padding: 10px 14px;
      border-radius: var(--radius-bubble);
      font-size: 14px;
      line-height: 1.45;
    }

    .bubble.user {
      background: var(--text-primary);
      color: var(--bg);
      border-bottom-right-radius: 4px;
    }

    .bubble.user .hashtag {
      color: #B4B2A9;
    }

    .bubble.brain {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 0.5px solid var(--border-card);
      border-bottom-left-radius: 4px;
    }

    .bubble-time {
      font-size: 11px;
      color: var(--text-secondary);
      padding: 0 4px;
      margin-bottom: 8px;
      text-align: right;
    }

    .confirm-block {
      background: var(--bg-confirm);
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-top: 4px;
    }

    .confirm-line {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-tag);
    }

    .confirm-line i {
      font-size: 15px;
      color: var(--text-secondary);
    }

    .confirm-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .confirm-tag {
      background: var(--bg-tag-confirmed);
      color: var(--text-tag-confirmed);
      font-size: 11px;
      padding: 1px 7px;
      border-radius: var(--radius-tag);
      font-family: var(--font-sans);
    }


    .input-bar {
      padding: 10px 14px 14px;
      flex-shrink: 0;
      background: var(--bg);
    }

    .input-inner {
      display: flex;
      align-items: center;
      background: var(--bg-card);
      border: 0.5px solid var(--border-input);
      border-radius: var(--radius-pill);
      padding: 8px 8px 8px 14px;
      gap: 8px;
    }

    .input-field {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text-primary);
      resize: none;
      line-height: 1.4;
      max-height: 80px;
      overflow-y: auto;
    }

    .input-field::placeholder {
      color: var(--text-tertiary);
    }

    .send-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--text-primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }

    .send-btn:hover {
      opacity: 0.85;
    }

    .send-btn:active {
      transform: scale(0.92);
    }

    .send-btn i {
      font-size: 16px;
      color: var(--bg);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .input-hint {
      font-size: 11px;
      color: var(--text-tertiary);
      padding: 0 4px 6px;
    }

    .input-hint .hint-tags {
      color: var(--text-secondary);
    }


    #recall-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      -webkit-overflow-scrolling: touch;
    }

    .brain-cards-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 85%;
      margin-bottom: 4px;
    }

    .suggestions-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 8px 14px 4px;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .suggestions-row::-webkit-scrollbar {
      display: none;
    }

    .suggestion-pill {
      background: var(--bg-card);
      border: 0.5px solid var(--border-input);
      color: var(--text-tag);
      font-size: 12px;
      padding: 5px 12px;
      border-radius: var(--radius-tag);
      white-space: nowrap;
      cursor: pointer;
      font-family: var(--font-sans);
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .suggestion-pill:hover {
      background: var(--bg-tag);
    }


    #recent-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px 8px;
      -webkit-overflow-scrolling: touch;
    }

    .date-group {
      margin-bottom: 16px;
    }

    .date-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      padding: 0 2px;
    }

    .recent-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-bar {
      padding: 10px 14px 14px;
      flex-shrink: 0;
      background: var(--bg);
    }

    .filter-inner {
      display: flex;
      align-items: center;
      background: var(--bg-card);
      border: 0.5px solid var(--border-input);
      border-radius: var(--radius-pill);
      padding: 8px 8px 8px 14px;
      gap: 8px;
    }

    .filter-field {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text-primary);
    }

    .filter-field::placeholder {
      color: var(--text-tertiary);
    }

    select.filter-field {
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    .refresh-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-tag);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .refresh-btn i {
      font-size: 16px;
      color: var(--text-secondary);
    }

    .refresh-btn.spinning i {
      animation: spin 0.6s linear;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }


    #remember-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      -webkit-overflow-scrolling: touch;
    }


    .loading-dots {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 0.5px solid var(--border-card);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
      animation: bounce 1.2s infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
      }

      30% {
        transform: translateY(-5px);
      }
    }


    #confirm-dialog,
    #append-sheet,
    #menu-sheet,
    #view-sheet,
    #token-sheet {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.3);
      align-items: flex-end;
      justify-content: center;
    }

    #confirm-dialog.open,
    #append-sheet.open,
    #menu-sheet.open,
    #view-sheet.open,
    #token-sheet.open {
      display: flex;
    }

    @keyframes slideUp {
      from {
        transform: translateY(40px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .confirm-sheet,
    .append-inner,
    .menu-inner,
    .view-inner,
    .token-inner {
      background: var(--bg);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 430px;
      animation: slideUp 0.2s ease;
    }

    .confirm-sheet {
      padding: 24px 24px 36px;
    }

    .append-inner {
      padding: 20px 20px 36px;
    }

    .menu-inner {
      padding: 20px 20px 36px;
    }

    .view-inner {
      padding: 20px 20px 36px;
      display: flex;
      flex-direction: column;
      max-height: 90vh;
    }

    .token-inner {
      padding: 20px 20px 28px;
      display: flex;
      flex-direction: column;
      max-height: 92vh;
    }

    .confirm-sheet h3,
    .append-inner h3,
    .menu-inner h3,
    .view-header h3,
    .token-header h3 {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .confirm-sheet p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .view-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .token-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    #auth-overlay .auth-mode {
      display: none;
      width: 100%;
    }

    #auth-overlay .auth-mode.active {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .auth-secondary {
      width: 100%;
      padding: 4px 0;
      background: none;
      color: var(--text-secondary);
      border: none;
      font-family: var(--font-sans);
      font-size: 13px;
      cursor: pointer;
      margin-top: 2px;
      text-align: center;
      transition: color 0.15s;
    }

    .auth-secondary:hover {
      color: var(--text-primary);
    }

    .identity-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
      min-width: 0;
    }

    .identity-chip,
    .namespace-select {
      min-width: 0;
      background: var(--bg-tag);
      border: none;
      border-radius: 8px;
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 11px;
      height: 24px;
    }

    .identity-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px;
      max-width: 46%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .namespace-select {
      flex: 1;
      padding: 0 8px;
      cursor: pointer;
      outline: none;
    }

    .token-toolbar,
    .token-actions,
    .token-form-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .token-toolbar {
      margin-bottom: 12px;
    }

    .token-body {
      overflow-y: auto;
      padding-right: 2px;
    }

    .token-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .token-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border-card);
      border-radius: var(--radius-card);
      padding: 12px;
    }

    .token-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
    }

    .token-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      overflow-wrap: anywhere;
    }

    .token-meta {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.45;
    }

    .token-pill {
      font-size: 10px;
      color: var(--text-tag-confirmed);
      background: var(--bg-tag-confirmed);
      border-radius: 999px;
      padding: 2px 7px;
      white-space: nowrap;
    }

    .token-form {
      display: none;
      background: var(--bg-card);
      border: 0.5px solid var(--border-card);
      border-radius: var(--radius-card);
      padding: 12px;
      margin-bottom: 12px;
    }

    .token-form.open {
      display: block;
    }

    .token-label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .token-input,
    .token-select {
      width: 100%;
      padding: 11px 12px;
      background: var(--bg);
      border: 0.5px solid var(--border-input);
      border-radius: 10px;
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
    }

    .token-output {
      display: none;
      background: #eef7ef;
      color: #235d34;
      border-radius: 10px;
      padding: 12px;
      font-size: 12px;
      line-height: 1.45;
      margin-bottom: 12px;
    }

    .token-output.open {
      display: block;
    }

    .token-output-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .token-output-code {
      flex: 1;
      min-width: 0;
      overflow-x: auto;
      white-space: nowrap;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      user-select: all;
    }

    .btn-token {
      flex: 1;
      min-height: 38px;
      padding: 10px 12px;
      background: var(--bg-tag);
      border: none;
      border-radius: 10px;
      color: var(--text-primary);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .btn-token.primary {
      background: var(--text-primary);
      color: var(--bg);
    }

    .btn-token.danger {
      background: #fdeaea;
      color: #c0392b;
    }

    .btn-token:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .btn-close-icon {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
    }

    .view-content {
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.5;
      overflow-y: auto;
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    .view-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .view-actions {
      display: flex;
      gap: 10px;
      margin-top: auto;
      flex-shrink: 0;
    }

    .btn-view-append {
      flex: 1;
      padding: 13px;
      background: var(--bg-tag);
      border: none;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 15px;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-view-forget {
      flex: 1;
      padding: 13px;
      background: #fdeaea;
      border: none;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 15px;
      color: #c0392b;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .confirm-actions,
    .append-actions {
      display: flex;
      gap: 10px;
    }

    .btn-cancel,
    .btn-append-cancel {
      flex: 1;
      padding: 13px;
      background: var(--bg-tag);
      border: none;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 15px;
      color: var(--text-primary);
      cursor: pointer;
    }

    .btn-delete {
      flex: 1;
      padding: 13px;
      background: #c0392b;
      border: none;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 15px;
      color: white;
      cursor: pointer;
    }

    .btn-append-save {
      flex: 1;
      padding: 13px;
      background: var(--text-primary);
      border: none;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 15px;
      color: var(--bg);
      cursor: pointer;
    }

    .btn-append-save:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .append-context {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 14px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .append-input-wrap {
      background: var(--bg-card);
      border: 0.5px solid var(--border-input);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .append-input-wrap textarea {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text-primary);
      resize: none;
      line-height: 1.45;
      min-height: 60px;
    }

    .append-input-wrap textarea::placeholder {
      color: var(--text-tertiary);
    }

    .menu-inner h3 {
      margin-bottom: 16px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-top: 0.5px solid var(--border);
      cursor: pointer;
      color: var(--text-primary);
      font-size: 15px;
      background: none;
      border-left: none;
      border-right: none;
      border-bottom: none;
      width: 100%;
      font-family: var(--font-sans);
      text-align: left;
      transition: color 0.15s;
    }

    .menu-item:hover {
      color: var(--text-secondary);
    }

    .menu-item i {
      font-size: 20px;
      color: var(--text-secondary);
    }

    .menu-item.danger {
      color: #c0392b;
    }

    .menu-item.danger i {
      color: #c0392b;
    }

    .language-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-top: 0.5px solid var(--border);
    }

    .language-row i {
      font-size: 20px;
      color: var(--text-secondary);
    }

    .language-select {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 15px;
      outline: none;
      cursor: pointer;
    }

    #sidebar {
      width: 240px;
      flex-shrink: 0;
      flex-direction: column;
      background: var(--bg);
      border-right: 0.5px solid var(--border);
      padding: 16px 10px 20px;
    }

    .sb-logo {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 10px 18px;
    }

    .sb-logo>div:last-child {
      flex: 1;
      min-width: 0;
    }

    .sb-brand-name {
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .sb-brand-status {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 1px;
    }

    .sb-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sb-tab {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 14px;
      font-family: var(--font-sans);
      width: 100%;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }

    .sb-tab i {
      font-size: 18px;
      flex-shrink: 0;
    }

    .sb-tab:hover,
    .sb-tab.active {
      background: var(--bg-tag);
      color: var(--text-primary);
    }

    .sb-tab.active {
      font-weight: 500;
    }

    .sb-footer {
      padding-top: 12px;
      border-top: 0.5px solid var(--border);
    }

    .sb-footer-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 14px;
      font-family: var(--font-sans);
      width: 100%;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }

    .sb-footer-btn:hover {
      background: var(--bg-tag);
      color: var(--text-primary);
    }

    .sb-footer-btn i {
      font-size: 18px;
    }

    @media (min-width: 768px) {

      html,
      body {
        height: 100%;
        overflow: auto;
      }

      body {
        background: #ECEAE4;
      }

      #auth-overlay {
        position: fixed;
        inset: 0;
        max-width: none;
        background: rgba(236, 234, 228, 0.92);
        backdrop-filter: blur(6px);
        align-items: center;
        justify-content: center;
        padding: 0;
      }

      .auth-card {
        background: var(--bg);
        border-radius: 20px;
        padding: 40px 36px;
        width: 420px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #app {
        flex-direction: row;
        height: 100vh;
        max-width: 100%;
        width: 100%;
        border-radius: 0;
        overflow: hidden;
        box-shadow: none;
      }

      #sidebar {
        display: flex;
      }

      #sidebar .identity-strip {
        width: 100%;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
        margin-top: 8px;
      }

      #sidebar .identity-chip,
      #sidebar .namespace-select {
        width: 100%;
        max-width: none;
        height: 28px;
      }

      #topbar {
        display: none;
      }

      #navbar {
        display: none;
      }

      #confirm-dialog,
      #append-sheet,
      #menu-sheet,
      #view-sheet,
      #token-sheet {
        align-items: center;
        justify-content: center;
      }

      .confirm-sheet,
      .append-inner,
      .menu-inner,
      .view-inner,
      .token-inner {
        border-radius: 16px;
        max-width: 400px;
      }

      .token-inner {
        max-width: 560px;
      }
    }


    ::-webkit-scrollbar {
      width: 0;
    }


    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 8px;
      color: var(--text-tertiary);
      font-size: 14px;
      text-align: center;
    }

    .empty-state i {
      font-size: 32px;
      margin-bottom: 4px;
    }

    @keyframes explode-out {
      0% {
        transform: scale(1);
        opacity: 1;
        filter: brightness(1) blur(0);
      }

      20% {
        transform: scale(1.05) translateY(-2px);
        opacity: 1;
        filter: brightness(1.5) blur(1px);
      }

      100% {
        transform: scale(0.6) translateY(20px);
        opacity: 0;
        filter: brightness(2.5) blur(8px);
      }
    }

    .explode-out {
      animation: explode-out 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important;
      pointer-events: none;
    }
  </style>
</head>

<body>


  <div id="auth-overlay">
    <div class="auth-card">
      <div class="brain-logo">
        <img src="/icon-transparent.svg" width="36" height="36" alt="Second Brain">
      </div>
      <h1 data-i18n="appName">Second Brain</h1>
      <p id="auth-subtitle" data-i18n="authSubtitle">输入 Bearer token，连接你的个人记忆层。</p>
      <form id="auth-login-form" class="field-group auth-mode active" onsubmit="connect(); return false;">
        <input type="text" name="username" value="user" autocomplete="username" style="display:none">
        <input type="url" id="auth-url" autocomplete="off" autocapitalize="none" hidden>
        <input type="password" id="auth-token" data-i18n-placeholder="bearerToken" placeholder="Bearer token" autocomplete="current-password">
        <button id="auth-connect" type="submit" data-i18n="connect">连接</button>
      </form>
      <form id="auth-setup-form" class="field-group auth-mode" onsubmit="setupFirstRun(); return false;">
        <input type="url" id="setup-url" autocomplete="off" autocapitalize="none" hidden>
        <input type="text" id="setup-name" data-i18n-placeholder="setupNamePlaceholder" autocomplete="name">
        <input type="password" id="setup-token" data-i18n-placeholder="setupTokenPlaceholder" autocomplete="new-password">
        <input type="text" id="setup-namespace" data-i18n-placeholder="namespacePlaceholder" autocomplete="off" autocapitalize="none">
        <button id="setup-submit" type="submit" data-i18n="setupCreate">创建管理员</button>
        <button class="auth-secondary" type="button" onclick="showAuthMode('login')" data-i18n="backToLogin">返回登录</button>
      </form>
      <div id="auth-error"></div>
    </div>
  </div>


  <div id="app" style="display:none">

    <div id="sidebar">
      <div class="sb-logo">
        <div class="brain-avatar">
          <img src="/icon-transparent.svg" width="20" height="20" alt="Second Brain">
        </div>
        <div>
          <div class="sb-brand-name" data-i18n="appName">Second Brain</div>
          <div class="sb-brand-status" id="sb-status">随时记得</div>
          <div class="identity-strip">
            <span class="identity-chip" id="sb-identity-chip"><i class="ti ti-user"></i><span data-i18n="unknownIdentity">未知身份</span></span>
            <select class="namespace-select" id="sb-namespace-select" onchange="setNamespace(this.value)" aria-label="Namespace"></select>
          </div>
        </div>
      </div>
      <nav class="sb-nav">
        <button class="sb-tab active" id="sb-tab-recall" onclick="switchTab('recall')">
          <i class="ti ti-search"></i><span data-i18n="recall">回忆</span>
        </button>
        <button class="sb-tab" id="sb-tab-recent" onclick="switchTab('recent')">
          <i class="ti ti-clock"></i><span data-i18n="recent">最近</span>
        </button>
        <button class="sb-tab" id="sb-tab-remember" onclick="switchTab('remember')">
          <i class="ti ti-plus"></i><span data-i18n="remember">记录</span>
        </button>
      </nav>
      <div class="sb-footer">
        <button class="sb-footer-btn" onclick="openMenu()">
          <i class="ti ti-settings"></i><span data-i18n="settings">设置</span>
        </button>
      </div>
    </div>

    <div id="main-panel">
      <div id="topbar">
        <div class="brain-avatar">
          <img src="/icon-transparent.svg" width="20" height="20" alt="Second Brain">
        </div>
        <div class="topbar-info">
          <div class="topbar-name" data-i18n="appName">Second Brain</div>
          <div class="topbar-status" id="topbar-status">随时记得</div>
          <div class="identity-strip">
            <span class="identity-chip" id="identity-chip"><i class="ti ti-user"></i><span data-i18n="unknownIdentity">未知身份</span></span>
            <select class="namespace-select" id="namespace-select" onchange="setNamespace(this.value)" aria-label="Namespace"></select>
          </div>
        </div>
        <button class="topbar-menu" onclick="openMenu()"><i class="ti ti-dots"></i></button>
      </div>

      <div id="screens">

        <div class="screen active" id="screen-recall">
          <div id="recall-messages">
            <div class="brain-cards-wrapper" id="recall-welcome">
              <div class="bubble brain" data-i18n="recallWelcome">问我任何你存过的内容，我会帮你找出来。</div>
            </div>
          </div>
          <div class="filter-bar" style="padding-bottom:0;">
            <div class="filter-inner">
              <i class="ti ti-tag" style="color:var(--text-tertiary);font-size:13px;flex-shrink:0;"></i>
              <select class="filter-field" id="tag-filter-recall" onchange="onTagChange(this.value)">
                <option value="" data-i18n="allTags">所有标签</option>
              </select>
            </div>
          </div>
          <div class="suggestions-row">
            <button class="suggestion-pill" data-i18n="suggestWorking" onclick="sendSuggestion(t('suggestWorking'))">我最近在做什么？</button>
            <button class="suggestion-pill" data-i18n="suggestDecisions" onclick="sendSuggestion(t('suggestDecisions'))">我最近做了什么决定？</button>
            <button class="suggestion-pill" data-i18n="suggestTasks" onclick="sendSuggestion(t('suggestTasks'))">显示我的任务</button>
            <button class="suggestion-pill" data-i18n="suggestGoals" onclick="sendSuggestion(t('suggestGoals'))">我的目标是什么？</button>
            <button class="suggestion-pill" data-i18n="suggestIdeas" onclick="sendSuggestion(t('suggestIdeas'))">我有什么想法？</button>
          </div>
          <div class="input-bar">
            <div class="input-inner">
              <button id="recall-clear-btn" class="refresh-btn" onclick="clearRecall()" style="display:none;"
                data-i18n-title="clearChat" title="清空对话">
                <i class="ti ti-trash"></i>
              </button>
              <textarea class="input-field" id="recall-input" data-i18n-placeholder="askBrain" placeholder="问问你的大脑..." rows="1"
                onkeydown="handleRecallKey(event)" oninput="autoResize(this)"></textarea>
              <button class="send-btn" onclick="sendRecall()"><i class="ti ti-arrow-up"></i></button>
            </div>
          </div>
        </div>


        <div class="screen" id="screen-recent">
          <div id="recent-list">
            <div class="empty-state"><i class="ti ti-clock"></i><span data-i18n="loadingMemories">正在加载记忆...</span></div>
          </div>
          <div class="filter-bar">
            <div class="filter-inner">
              <i class="ti ti-tag" style="color:var(--text-tertiary);font-size:13px;flex-shrink:0;"></i>
              <select class="filter-field" id="tag-filter-recent" onchange="onTagChange(this.value)">
                <option value="" data-i18n="allTags">所有标签</option>
              </select>
              <button class="refresh-btn" id="refresh-btn" onclick="loadRecent()"><i class="ti ti-refresh"></i></button>
            </div>
          </div>
        </div>


        <div class="screen" id="screen-remember">
          <div id="remember-messages">
            <div class="bubble-row brain">
              <div class="bubble brain" data-i18n-html="rememberWelcome">你想记住什么？用 <span style="color:var(--text-secondary)">#标签</span> 来整理。</div>
            </div>
          </div>
          <div class="input-bar">
            <div class="input-hint" data-i18n-html="rememberHint">提示：可以在消息任意位置添加 <span class="hint-tags">#标签</span></div>
            <div class="input-inner">
              <button id="remember-clear-btn" class="refresh-btn" onclick="clearRemember()" style="display:none;"
                data-i18n-title="clearChat" title="清空对话">
                <i class="ti ti-trash"></i>
              </button>
              <textarea class="input-field" id="remember-input" data-i18n-placeholder="tellBrain" placeholder="告诉你的大脑一些事..." rows="1"
                onkeydown="handleRememberKey(event)" oninput="autoResize(this)"></textarea>
              <button class="send-btn" onclick="sendRemember()"><i class="ti ti-arrow-up"></i></button>
            </div>
          </div>
        </div>
      </div>

      <div id="navbar">
        <button class="nav-tab active" id="tab-recall" onclick="switchTab('recall')">
          <i class="ti ti-search"></i><span data-i18n="recall">回忆</span>
        </button>
        <button class="nav-tab" id="tab-recent" onclick="switchTab('recent')">
          <i class="ti ti-clock"></i><span data-i18n="recent">最近</span>
        </button>
        <button class="nav-tab" id="tab-remember" onclick="switchTab('remember')">
          <i class="ti ti-plus"></i><span data-i18n="remember">记录</span>
        </button>
      </div>
    </div>
  </div>


  <div id="confirm-dialog">
    <div class="confirm-sheet">
      <h3 data-i18n="forgetTitle">删除这条记忆？</h3>
      <p data-i18n="forgetBody">此操作无法撤销。这条记忆会从你的大脑中移除。</p>
      <div class="confirm-actions">
        <button class="btn-cancel" onclick="closeConfirm()" data-i18n="cancel">取消</button>
        <button class="btn-delete" onclick="confirmForget()" data-i18n="forget">删除</button>
      </div>
    </div>
  </div>


  <div id="append-sheet">
    <div class="append-inner">
      <h3 data-i18n="appendTitle">添加更新</h3>
      <div class="append-context" id="append-context-preview"></div>
      <div class="append-input-wrap">
        <textarea id="append-textarea" data-i18n-placeholder="appendPlaceholder" placeholder="有什么变化或新增内容？" rows="3"></textarea>
      </div>
      <div class="append-actions">
        <button class="btn-append-cancel" onclick="closeAppend()" data-i18n="cancel">取消</button>
        <button class="btn-append-save" id="append-save-btn" onclick="saveAppend()" data-i18n="update">更新</button>
      </div>
    </div>
  </div>

  <div id="view-sheet">
    <div class="view-inner">
      <div class="view-header">
        <h3 data-i18n="memory">记忆</h3>
        <button class="btn-close-icon" onclick="closeView()"><i class="ti ti-x"></i></button>
      </div>
      <div class="view-content" id="view-content-text"></div>
      <div class="view-tags" id="view-tags-container"></div>
      <div class="view-actions">
        <button class="btn-view-append" id="view-btn-append"><i class="ti ti-writing"></i> <span data-i18n="append">追加</span></button>
        <button class="btn-view-forget" id="view-btn-forget"><i class="ti ti-trash"></i> <span data-i18n="forget">删除</span></button>
      </div>
    </div>
  </div>


  <div id="menu-sheet">
    <div class="menu-inner">
      <h3 data-i18n="appName">Second Brain</h3>
      <div class="language-row">
        <i class="ti ti-language"></i>
        <select class="language-select" id="language-select" onchange="setLanguage(this.value)" aria-label="Language">
          <option value="zh-CN">中文</option>
          <option value="en">English</option>
        </select>
      </div>
      <button class="menu-item" onclick="closeMenu(); switchTab('recent')">
        <i class="ti ti-clock"></i> <span data-i18n="viewAll">查看所有记忆</span>
      </button>
      <button class="menu-item" id="token-menu-item" onclick="closeMenu(); openTokenSheet()" style="display:none">
        <i class="ti ti-key"></i> <span data-i18n="tokenManagement">Token 管理</span>
      </button>
      <button class="menu-item danger" onclick="logout()">
        <i class="ti ti-logout"></i> <span data-i18n="disconnect">断开连接</span>
      </button>
    </div>
  </div>

  <div id="token-sheet">
    <div class="token-inner">
      <div class="token-header">
        <h3 data-i18n="tokenManagement">Token 管理</h3>
        <button class="btn-close-icon" onclick="closeTokenSheet()"><i class="ti ti-x"></i></button>
      </div>
      <div class="token-toolbar">
        <button class="btn-token primary" onclick="openTokenForm()"><i class="ti ti-plus"></i><span data-i18n="newToken">新建 Token</span></button>
        <button class="btn-token" id="reindex-btn" onclick="reindexNamespace()"><i class="ti ti-refresh"></i><span data-i18n="reindex">重建索引</span></button>
      </div>
      <div class="token-body">
        <div class="token-output" id="token-output"></div>
        <div class="token-form" id="token-form">
          <input type="hidden" id="token-edit-id">
          <label class="token-label"><span data-i18n="tokenName">名称</span><input class="token-input" id="token-name" type="text"></label>
