    function t(key, ...args) {
      const value = (I18N[currentLanguage] || I18N['zh-CN'])[key] ?? I18N.en[key] ?? key;
      return typeof value === 'function' ? value(...args) : value;
    }

    function setLanguage(lang) {
      currentLanguage = I18N[lang] ? lang : 'zh-CN';
      localStorage.setItem('sb_lang', currentLanguage);
      document.documentElement.lang = currentLanguage;
      const languageSelect = document.getElementById('language-select');
      if (languageSelect) languageSelect.value = currentLanguage;
      applyTranslations();
      loadTags();
      renderRecent(allEntries);
      updateStatus();
    }

    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
      document.querySelectorAll('[data-i18n-html]').forEach(el => { el.innerHTML = t(el.dataset.i18nHtml); });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
      document.querySelectorAll('[data-i18n-title]').forEach(el => { el.title = t(el.dataset.i18nTitle); });
      const saveBtn = document.getElementById('append-save-btn');
      if (saveBtn && !saveBtn.disabled) saveBtn.textContent = t('update');
      const forgetBtn = document.querySelector('#confirm-dialog .btn-delete');
      if (forgetBtn && !forgetBtn.disabled) forgetBtn.textContent = t('forget');
      renderIdentity();
      renderTokenList();
    }

    function init() {
      currentLanguage = localStorage.getItem('sb_lang') || 'zh-CN';
      applyTranslations();
      const languageSelect = document.getElementById('language-select');
      if (languageSelect) languageSelect.value = currentLanguage;
      // Auto-populate URL from the current page origin (UI is hosted on the same Worker)
      const origin = window.location.origin;
      document.getElementById('auth-url').value = origin;
      document.getElementById('setup-url').value = origin;

      const url = localStorage.getItem('sb_url') || origin;
      const tok = localStorage.getItem('sb_token');
      const ns = localStorage.getItem('sb_namespace') || '';
      if (ns) currentNamespace = ns;
      checkAuthStatus(url);
      if (tok) { WORKER_URL = url; AUTH_TOKEN = tok; showApp(); }
    }

    function authHeaders(extra = {}) {
      return { ...extra, ...(AUTH_TOKEN ? { 'Authorization': `Bearer ${AUTH_TOKEN}` } : {}) };
    }

    function nsParam() {
      return currentNamespace ? `namespace=${encodeURIComponent(currentNamespace)}` : '';
    }

    function withNamespace(args = {}) {
      return currentNamespace ? { ...args, namespace: currentNamespace } : { ...args };
    }

    function showAuthMode(mode) {
      const isSetup = mode === 'setup';
      document.getElementById('auth-login-form').classList.toggle('active', !isSetup);
      document.getElementById('auth-setup-form').classList.toggle('active', isSetup);
      document.getElementById('auth-subtitle').textContent = t(isSetup ? 'setupSubtitle' : 'authSubtitle');
      document.getElementById('auth-error').textContent = '';
    }

    async function checkAuthStatus(url) {
      try {
        const res = await fetch(`${url}/auth/status`);
        if (!res.ok) return;
        const status = await res.json();
        if (status.setupRequired || status.needsSetup || status.firstRun) showAuthMode('setup');
      } catch { }
    }

    async function setupFirstRun() {
      const url = (document.getElementById('setup-url').value.trim() || window.location.origin).replace(/\/$/, '');
      const name = document.getElementById('setup-name').value.trim();
      const token = document.getElementById('setup-token').value.trim();
      const namespace = document.getElementById('setup-namespace').value.trim() || 'default';
      const err = document.getElementById('auth-error');
      const btn = document.getElementById('setup-submit');
      if (!url || !name || !token) { err.textContent = t('fillFields'); return; }
      btn.textContent = t('settingUp'); btn.disabled = true; err.textContent = '';
      try {
        const res = await fetch(`${url}/auth/setup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, token, namespace, namespaces: [namespace], role: 'admin' })
        });
        if (!res.ok) throw new Error(t('serverError', res.status));
        const data = await res.json();
        const issuedToken = data.token || data.plaintext || token;
        localStorage.setItem('sb_url', url);
        localStorage.setItem('sb_token', issuedToken);
        localStorage.setItem('sb_namespace', namespace);
        WORKER_URL = url; AUTH_TOKEN = issuedToken; currentNamespace = namespace;
        showApp();
      } catch (e) {
        err.textContent = e.message || t('connectFailed');
        btn.textContent = t('setupCreate'); btn.disabled = false;
      }
    }

    async function connect() {
      const url = (document.getElementById('auth-url').value.trim() || window.location.origin).replace(/\/$/, '');
      const tok = document.getElementById('auth-token').value.trim();
      const err = document.getElementById('auth-error');
      const btn = document.getElementById('auth-connect');
      if (!url || !tok) { err.textContent = t('fillFields'); return; }
      btn.textContent = t('connecting'); btn.disabled = true; err.textContent = '';
      try {
        const res = await fetch(`${url}/auth/me`, { headers: { 'Authorization': `Bearer ${tok}` } });
        if (res.status === 401) throw new Error(t('invalidToken'));
        if (!res.ok) throw new Error(t('serverError', res.status));
        localStorage.setItem('sb_url', url); localStorage.setItem('sb_token', tok);
        WORKER_URL = url; AUTH_TOKEN = tok; showApp();
      } catch (e) {
        err.textContent = e.message || t('connectFailed');
        btn.textContent = t('connect'); btn.disabled = false;
      }
    }

    function showApp() {
      document.getElementById('auth-overlay').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      loadIdentity(); loadRecent(); loadTags(); updateStatus();
    }

    async function loadIdentity() {
      try {
        const res = await fetch(`${WORKER_URL}/auth/me`, { headers: authHeaders() });
        if (!res.ok) throw new Error();
        currentIdentity = await res.json();
        availableNamespaces = await loadVisibleNamespaces(currentIdentity);
        if (!availableNamespaces.length && currentIdentity.namespace) availableNamespaces = [currentIdentity.namespace];
        const preferredNamespace = currentNamespace || currentIdentity.defaultNamespace || currentIdentity.namespace || availableNamespaces[0] || 'default';
        if (!availableNamespaces.includes(preferredNamespace)) {
          currentNamespace = availableNamespaces[0] || currentIdentity.defaultNamespace || currentIdentity.namespace || 'default';
        } else {
          currentNamespace = preferredNamespace;
        }
        localStorage.setItem('sb_namespace', currentNamespace);
      } catch {
        currentIdentity = null;
        if (!currentNamespace) currentNamespace = localStorage.getItem('sb_namespace') || 'default';
        availableNamespaces = [currentNamespace];
      }
      renderIdentity();
      if (isAdmin()) loadTokens();
    }

    async function loadVisibleNamespaces(identity) {
      const defaults = identity.namespaces || identity.allowedNamespaces || identity.writeNamespaces || [];
      try {
        const res = await fetch(`${WORKER_URL}/namespaces`, { headers: authHeaders() });
        if (!res.ok) throw new Error();
        const data = await res.json();
        const namespaces = Array.isArray(data) ? data : (data.namespaces || []);
        if (namespaces.length) return Array.from(new Set(namespaces.filter(Boolean)));
      } catch { }
      return Array.from(new Set([identity.defaultNamespace || identity.namespace || '', ...defaults].filter(Boolean)));
    }

    function renderIdentity() {
      const chips = [document.getElementById('identity-chip'), document.getElementById('sb-identity-chip')].filter(Boolean);
      const selects = [document.getElementById('namespace-select'), document.getElementById('sb-namespace-select')].filter(Boolean);
      if (chips.length) {
        const name = currentIdentity?.name || currentIdentity?.id || t('unknownIdentity');
        const role = currentIdentity?.role ? ` (${currentIdentity.role})` : '';
        chips.forEach(chip => { chip.innerHTML = `<i class="ti ti-user"></i><span>${escHtml(name + role)}</span>`; });
      }
      if (selects.length) {
        const namespaces = availableNamespaces.length ? availableNamespaces : [currentNamespace || 'default'];
        selects.forEach(sel => {
          sel.innerHTML = namespaces.map(ns => `<option value="${escHtml(ns)}"${ns === currentNamespace ? ' selected' : ''}>${escHtml(t('namespaceLabel', ns))}</option>`).join('');
        });
      }
      const tokenMenu = document.getElementById('token-menu-item');
      if (tokenMenu) tokenMenu.style.display = isAdmin() ? 'flex' : 'none';
    }

    function isAdmin() {
      return currentIdentity?.isAdmin || currentIdentity?.admin || currentIdentity?.role === 'admin' || (currentIdentity?.scopes || []).includes('admin');
    }

    function setNamespace(ns) {
      currentNamespace = ns || 'default';
      localStorage.setItem('sb_namespace', currentNamespace);
      renderIdentity();
      loadRecent(); loadTags(); updateStatus();
    }

    async function loadTags() {
      try {
        const query = nsParam();
        const res = await fetch(`${WORKER_URL}/tags${query ? '?' + query : ''}`, { headers: authHeaders() });
        const tags = await res.json();
        ['tag-filter-recent', 'tag-filter-recall'].forEach(id => {
          const sel = document.getElementById(id);
          if (!sel) return;
          sel.innerHTML = `<option value="">${t('allTags')}</option>`;
          tags.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t; opt.textContent = t;
            if (t === selectedTag) opt.selected = true;
            sel.appendChild(opt);
          });
        });
      } catch { }
    }

    function onTagChange(tag) {
      selectedTag = tag;
      ['tag-filter-recent', 'tag-filter-recall'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = tag;
      });
      if (currentTab === 'recent') filterRecent(tag);
    }

    function logout() {
      closeMenu();
      localStorage.removeItem('sb_url'); localStorage.removeItem('sb_token'); localStorage.removeItem('sb_namespace');
      WORKER_URL = ''; AUTH_TOKEN = ''; currentIdentity = null; currentNamespace = ''; availableNamespaces = []; adminTokens = [];
      document.getElementById('app').style.display = 'none';
      document.getElementById('auth-overlay').style.display = 'flex';
      document.getElementById('auth-url').value = '';
      document.getElementById('auth-token').value = '';
      document.getElementById('auth-error').textContent = '';
      document.getElementById('auth-connect').textContent = t('connect');
      document.getElementById('auth-connect').disabled = false;
      showAuthMode('login');
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-tab, .sb-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('screen-' + tab).classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
      const sbTab = document.getElementById('sb-tab-' + tab);
      if (sbTab) sbTab.classList.add('active');
      if (tab === 'recent') loadRecent();
    }

    async function updateStatus() {
      try {
        const query = nsParam();
        const res = await fetch(`${WORKER_URL}/list?n=1000${query ? '&' + query : ''}`, { headers: authHeaders() });
        const data = await res.json();
        const count = Array.isArray(data) ? data.length : 0;
        const text = count === 0 ? t('alwaysRemembers') : t('memoryStored', count);
        document.getElementById('topbar-status').textContent = text;
        const sb = document.getElementById('sb-status');
        if (sb) sb.textContent = text;
      } catch { }
    }

    async function apiMcp(toolName, args) {
      const res = await fetch(`${WORKER_URL}/mcp`, {
        method: 'POST',
        headers: authHeaders({ 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream' }),
        body: JSON.stringify({ jsonrpc: '2.0', id: Date.now(), method: 'tools/call', params: { name: toolName, arguments: withNamespace(args) } })
      });
      const text = await res.text();
      const match = text.match(/data: ({.+})/s);
      if (!match) throw new Error(t('invalidResponse'));
      const json = JSON.parse(match[1]);
      if (json.error) throw new Error(json.error.message || t('mcpError'));
      return json.result?.content?.[0]?.text ?? '';
    }

    async function apiCapture(content, tags, source) {
      const res = await fetch(`${WORKER_URL}/capture`, {
        method: 'POST',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify(withNamespace({ content, tags, source: source || 'web-ui' }))
      });
      return res.json();
    }

    async function apiList(n = 50) {
      const query = nsParam();
      const res = await fetch(`${WORKER_URL}/list?n=${n}${query ? '&' + query : ''}`, { headers: authHeaders() });
      return res.json();
    }

    function sendSuggestion(text) {
      document.getElementById('recall-input').value = text; sendRecall();
    }
    function handleRecallKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendRecall(); } }

    async function sendRecall() {
      const input = document.getElementById('recall-input');
      const query = input.value.trim();
      if (!query) return;
      const msgs = document.getElementById('recall-messages');
      const welcome = document.getElementById('recall-welcome');
      if (welcome) welcome.remove();
      appendUserBubble(msgs, query);
      input.value = ''; autoResize(input);
      const loadingEl = appendLoading(msgs);
      msgs.scrollTop = msgs.scrollHeight;
      try {
        const result = await apiMcp('recall', { query, topK: 5, ...(selectedTag ? { tag: selectedTag } : {}) });
        loadingEl.remove();
        if (!result || result.includes('Nothing found')) {
          appendBrainBubble(msgs, t('nothingFound'));
        } else {
          const entries = parseRecallResult(result);
          const answerBubble = document.createElement('div');
          answerBubble.className = 'bubble-row brain';
          const answerEl = document.createElement('div');
          answerEl.className = 'bubble brain';
          answerBubble.appendChild(answerEl);
          msgs.appendChild(answerBubble);


          const res = await fetch(`${WORKER_URL}/chat`, {
            method: 'POST',
            headers: authHeaders({ 'Content-Type': 'application/json' }),
            body: JSON.stringify(withNamespace({ query, memories: result }))
          });

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let fullText = '';
          try {
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              const chunk = decoder.decode(value);
              chunk.split('\n').forEach(line => {
                if (line.startsWith('data: ')) {
                  const raw = line.slice(6).trim();
                  if (raw === '[DONE]') return;
                  try {
                    const d = JSON.parse(raw);
                    if (d.response) { fullText += d.response; answerEl.textContent = fullText; }
                  } catch { }
                }
              });
              msgs.scrollTop = msgs.scrollHeight;
            }
          } finally {
            reader.releaseLock();
          }

          // 2. Sources toggle
          const sourcesToggle = document.createElement('div');
          sourcesToggle.className = 'sources-toggle';
          sourcesToggle.innerHTML = `<button onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'flex' : 'none'">
            <i class="ti ti-files"></i> ${t('sourceCount', entries.length)}
          </button>
          <div class="brain-cards-wrapper" style="display:none"></div>`;
          entries.forEach(e => sourcesToggle.querySelector('.brain-cards-wrapper').appendChild(makeRecallCard(e)));
          msgs.appendChild(sourcesToggle);
          document.getElementById('recall-clear-btn').style.display = 'flex';
        }
      } catch {
        loadingEl.remove();
        appendBrainBubble(msgs, t('somethingWrong'));
      }
      msgs.scrollTop = msgs.scrollHeight;
    }

    function parseRecallResult(text) {
      const entries = [];
      text.split(/\n\n(?=\d+\.)/).filter(b => b.trim()).forEach(block => {
        const h = block.match(/^\d+\.\s+\[(.+?)\]\s+\((\d+)%[^)]*\)(?:\s+\([^)]*\))?(?:\s+\[[^\]]*\])?/);
        if (h) {
          const meta = h[1], score = parseInt(h[2]);
          let content = block.replace(/^\d+\.\s+\[.+?\]\s+\([^)]+\)(?:\s+\([^)]*\))?(?:\s+\[[^\]]*\])?\n?/, '').trim();
          let id = '';
          const idMatch = content.match(/^ID:\s+([^\n]+)\n?/);
          if (idMatch) {
            id = idMatch[1].trim();
            content = content.substring(idMatch[0].length).trim();
          }
          const parts = meta.split(' · ');
          const tagsStr = parts.slice(2).join(' · ');
          const tags = tagsStr ? tagsStr.replace(/^\[|\]$/g, '').split(', ').filter(Boolean) : [];
          entries.push({ score, id, content, date: parts[0] || '', source: parts[1] || '', tags });
        }
      });
      return entries;
    }

    function makeRecallCard(entry) {
      const card = document.createElement('div');
      card.className = 'memory-card';
      card.innerHTML = `
    <div class="match-line">
      <span class="match-pct">${entry.score}%</span>
      <div class="match-bar-bg"><div class="match-bar-fill" style="width:${entry.score}%"></div></div>
    </div>
    <div class="card-content" style="cursor: pointer;">${escHtml(entry.content)}</div>
    <div class="card-footer">
      <div class="card-tags">${entry.tags.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join('')}</div>
      <div class="card-actions">
        ${entry.id
          ? `<button class="card-action-btn" onclick="openAppend('${escAttr(entry.id)}', '${escAttr(entry.content.slice(0, 80))}')"><i class="ti ti-writing"></i> ${t('appendAction')}</button>
             <button class="card-action-btn" onclick="openConfirm('${escAttr(entry.id)}', this)"><i class="ti ti-x"></i> ${t('forget')}</button>`
          : `<button class="card-action-btn" onclick="openAppendFromContent('${escAttr(entry.content)}')"><i class="ti ti-writing"></i> ${t('appendAction')}</button>`
        }
      </div>
    </div>`;
      card.querySelector('.card-content').onclick = () => openView(entry, card);
      return card;
    }

    async function loadRecent() {
      const list = document.getElementById('recent-list');
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning');
      list.innerHTML = `<div class="empty-state"><i class="ti ti-clock"></i><span>${t('loading')}</span></div>`;
      try {
        allEntries = await apiList(50);
        renderRecent(allEntries); updateStatus(); loadTags();
      } catch {
        list.innerHTML = `<div class="empty-state"><i class="ti ti-wifi-off"></i><span>${t('loadFailed')}</span></div>`;
      }
      btn.classList.remove('spinning');
    }

    function filterRecent(val) {
      const tag = (val || '').replace(/^#/, '').toLowerCase().trim();
      if (!tag) { renderRecent(allEntries); return; }
      renderRecent(allEntries.filter(e => {
        try { return JSON.parse(e.tags || '[]').some(t => t.toLowerCase() === tag); } catch { return false; }
      }));
    }

    function renderRecent(entries) {
      const list = document.getElementById('recent-list');
      if (!entries.length) {
        list.innerHTML = `<div class="empty-state"><i class="ti ti-brain"></i><span>${t('noMemories')}</span></div>`;
        return;
      }
      const groups = {}, now = new Date();
      const today = toDateStr(now), yesterday = toDateStr(new Date(now - 86400000));
      entries.forEach(entry => {
        const d = new Date(entry.created_at), ds = toDateStr(d);
        const label = ds === today ? t('today') : ds === yesterday ? t('yesterday') : d.toLocaleDateString(t('locale'), { month: 'short', day: 'numeric' });
        if (!groups[label]) groups[label] = [];
        groups[label].push(entry);
      });
      list.innerHTML = '';
      Object.entries(groups).forEach(([label, group]) => {
        const g = document.createElement('div');
        g.className = 'date-group';
        g.innerHTML = `<div class="date-label">${label}</div>`;
        const cards = document.createElement('div');
        cards.className = 'recent-cards';
        group.forEach(e => cards.appendChild(makeRecentCard(e)));
        g.appendChild(cards); list.appendChild(g);
      });
    }

    function toDateStr(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

    function makeRecentCard(entry) {
      let tags = [];
      try { tags = JSON.parse(entry.tags || '[]'); } catch { }
      const card = document.createElement('div');
      card.className = 'memory-card';
      card.dataset.id = entry.id;
      card.innerHTML = `
    <div class="card-content" style="cursor: pointer;">${escHtml(entry.content)}</div>
    <div class="card-footer">
      <div class="card-tags">${tags.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join('')}</div>
      <div class="card-actions">
        <button class="card-action-btn" onclick="openAppend('${escAttr(entry.id)}', '${escAttr(entry.content.slice(0, 80))}')"><i class="ti ti-writing"></i> ${t('appendAction')}</button>
        <button class="card-action-btn" onclick="openConfirm('${escAttr(entry.id)}', this)"><i class="ti ti-x"></i> ${t('forget')}</button>
      </div>
    </div>`;
      card.querySelector('.card-content').onclick = () => openView({ id: entry.id, content: entry.content, tags }, card);
      return card;
    }

    function handleRememberKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendRemember(); } }

    async function sendRemember() {
      const input = document.getElementById('remember-input');
      const raw = input.value.trim();
      if (!raw) return;
      const msgs = document.getElementById('remember-messages');
      const tags = [], tagRe = /#([a-zA-Z0-9_-]+)/g;
      let m;
      while ((m = tagRe.exec(raw)) !== null) tags.push(m[1]);
      const content = raw.replace(/#[a-zA-Z0-9_-]+/g, '').trim();
      const userRow = document.createElement('div');
      userRow.className = 'bubble-row user';
      userRow.innerHTML = `<div class="bubble user">${raw.replace(/#([a-zA-Z0-9_-]+)/g, '<span class="hashtag">#$1</span>')}</div>`;
      msgs.appendChild(userRow);
      input.value = ''; autoResize(input);
      msgs.scrollTop = msgs.scrollHeight;
      const loadingEl = appendLoading(msgs);
      msgs.scrollTop = msgs.scrollHeight;
      try {
        const result = await apiCapture(content || raw, tags, 'web-ui');
        loadingEl.remove();
        if (result.duplicate) {
          appendBrainBubble(msgs, t('duplicateStored'));
        } else {
          appendBrainBubble(msgs, t('stored'));
          if (tags.length) {
            const confirmEl = document.createElement('div');
            confirmEl.className = 'confirm-block';
            confirmEl.innerHTML = `<div class="confirm-line"><i class="ti ti-circle-check"></i> ${t('taggedAs')}</div><div class="confirm-tags">${tags.map(t => `<span class="confirm-tag">${escHtml(t)}</span>`).join('')}</div>`;
            msgs.appendChild(confirmEl);
          }
          updateStatus();
        }
        document.getElementById('remember-clear-btn').style.display = 'flex';
      } catch {
        loadingEl.remove();
        appendBrainBubble(msgs, t('somethingWrongShort'));
      }
      msgs.scrollTop = msgs.scrollHeight;
    }

    function openAppend(id, preview) {
      pendingAppendId = id;
      document.getElementById('append-context-preview').textContent = preview + '...';
      document.getElementById('append-textarea').value = '';
      document.getElementById('append-sheet').classList.add('open');
      setTimeout(() => document.getElementById('append-textarea').focus(), 100);
    }
    function openAppendFromContent() { switchTab('remember'); document.getElementById('remember-input').focus(); }
    function closeAppend() { document.getElementById('append-sheet').classList.remove('open'); pendingAppendId = null; }
    async function saveAppend() {
      const addition = document.getElementById('append-textarea').value.trim();
      if (!addition || !pendingAppendId) return;
      const btn = document.getElementById('append-save-btn');
      btn.disabled = true; btn.textContent = t('saving');
      try {
        await apiMcp('append', { id: pendingAppendId, addition });
        closeAppend(); loadRecent(); updateStatus();
      } catch (e) {
        btn.disabled = false; btn.textContent = t('update');
        alert(t('appendFailed', e.message));
      }
    }

    function openConfirm(id, btnOrCard) {
      pendingForgetId = id;
      pendingForgetCard = btnOrCard ? (btnOrCard.classList?.contains('memory-card') ? btnOrCard : btnOrCard.closest('.memory-card')) : null;
      document.getElementById('confirm-dialog').classList.add('open');
    }
    function closeConfirm() {
      document.getElementById('confirm-dialog').classList.remove('open');
      pendingForgetId = null; pendingForgetCard = null;
    }
    async function confirmForget() {
      if (!pendingForgetId) return;
      const idToForget = pendingForgetId;
      const cardElement = pendingForgetCard;
      const btn = document.querySelector('#confirm-dialog .btn-delete');
      if (btn) { btn.disabled = true; btn.textContent = t('forgetting'); }

      try {
        await apiMcp('forget', { id: idToForget });
        closeConfirm();
        if (cardElement) {
          cardElement.style.transition = 'none';
          cardElement.classList.add('explode-out');
          setTimeout(() => cardElement?.remove(), 400);
        }
        allEntries = allEntries.filter(e => e.id !== idToForget);
        updateStatus();
      } catch (e) {
        alert(t('forgetFailed', e.message));
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = t('forget'); }
      }
    }

    function openTokenSheet() {
      if (!isAdmin()) { alert(t('adminOnly')); return; }
      document.getElementById('token-sheet').classList.add('open');
      loadTokens();
    }
    function closeTokenSheet() { document.getElementById('token-sheet').classList.remove('open'); closeTokenForm(); }

    async function loadTokens() {
      if (!isAdmin() || !WORKER_URL) return;
      const list = document.getElementById('token-list');
      if (list) list.innerHTML = `<div class="empty-state"><i class="ti ti-key"></i><span>${t('loading')}</span></div>`;
      try {
        const res = await fetch(`${WORKER_URL}/admin/tokens`, { headers: authHeaders() });
        if (!res.ok) throw new Error(t('serverError', res.status));
        const data = await res.json();
        adminTokens = Array.isArray(data) ? data : (data.tokens || []);
        renderTokenList();
      } catch {
        if (list) list.innerHTML = `<div class="empty-state"><i class="ti ti-wifi-off"></i><span>${t('loadFailed')}</span></div>`;
      }
    }

    function renderTokenList() {
      const list = document.getElementById('token-list');
      if (!list) return;
      if (!adminTokens.length) {
        list.innerHTML = `<div class="empty-state"><i class="ti ti-key"></i><span>${t('noTokens')}</span></div>`;
        return;
      }
      list.innerHTML = '';
      adminTokens.forEach(token => {
        const card = document.createElement('div');
        card.className = 'token-card';
        const defaultNamespace = token.defaultNamespace || token.namespace || 'default';
        const read = token.readNamespaces || token.namespaces || token.allowedNamespaces || [];
        const write = token.writeNamespaces || [];
        const del = token.deleteNamespaces || [];
        const revoked = token.revoked || token.revokedAt || token.revoked_at;
        card.innerHTML = `
          <div class="token-card-head">
            <div>
              <div class="token-name">${escHtml(token.label || token.name || token.id || 'token')}</div>
              <div class="token-meta">${escHtml(token.role || 'writer')} / ${escHtml(defaultNamespace)} / R:${escHtml(read.join(', ') || '-')} W:${escHtml(write.join(', ') || '-')} D:${escHtml(del.join(', ') || '-')}</div>
            </div>
            ${revoked ? `<span class="token-pill">${t('revoked')}</span>` : ''}
          </div>
          <div class="token-actions">
            <button class="btn-token" onclick="openTokenForm('${escAttr(token.id)}')"><i class="ti ti-pencil"></i><span>${t('editToken')}</span></button>
            <button class="btn-token" onclick="showTokenValue('${escAttr(token.id)}')" ${revoked || !token.token ? 'disabled' : ''}><i class="ti ti-eye"></i><span>${t('viewToken')}</span></button>
            <button class="btn-token danger" onclick="revokeToken('${escAttr(token.id)}')" ${revoked ? 'disabled' : ''}><i class="ti ti-ban"></i><span>${t('revokeToken')}</span></button>
          </div>`;
        list.appendChild(card);
      });
    }

    function openTokenForm(id = '') {
      const form = document.getElementById('token-form');
      const token = adminTokens.find(t => String(t.id) === String(id));
      document.getElementById('token-edit-id').value = token?.id || '';
      const defaultNamespace = token?.defaultNamespace || token?.namespace || currentNamespace || 'default';
      const namespaces = token?.namespaces || token?.allowedNamespaces || token?.readNamespaces || [defaultNamespace];
      document.getElementById('token-name').value = token?.label || token?.name || '';
      document.getElementById('token-role').value = token?.role || 'writer';
      document.getElementById('token-namespaces').value = namespaces.join(', ');
      document.getElementById('token-output').classList.remove('open');
      form.classList.add('open');
    }

    function closeTokenForm() {
      const form = document.getElementById('token-form');
      if (form) form.classList.remove('open');
    }

    async function saveToken() {
      const id = document.getElementById('token-edit-id').value;
      const btn = document.getElementById('token-save-btn');
      const splitNamespaces = value => value.split(',').map(s => s.trim()).filter(Boolean);
      const namespaces = splitNamespaces(document.getElementById('token-namespaces').value || 'default');
      const role = document.getElementById('token-role').value;
      const defaultNamespace = namespaces[0] || 'default';
      const payload = {
        label: document.getElementById('token-name').value.trim(),
        role,
        defaultNamespace,
        readNamespaces: namespaces,
        writeNamespaces: role === 'reader' ? [] : namespaces,
        deleteNamespaces: role === 'admin' ? ['*'] : []
      };
      btn.disabled = true; btn.textContent = t('saving');
      try {
        const res = await fetch(id ? `${WORKER_URL}/admin/tokens/${encodeURIComponent(id)}` : `${WORKER_URL}/admin/tokens`, {
          method: id ? 'PUT' : 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error(t('serverError', res.status));
        const data = await res.json();
        const rawToken = data.token || data.plaintext || data.secret || data.value;
        rawToken ? showTokenOutput(rawToken) : showTokenMessage(t('tokenSaved'));
        closeTokenForm();
        await loadTokens();
      } catch (e) {
        alert(e.message || t('somethingWrongShort'));
      } finally {
        btn.disabled = false; btn.textContent = t('saveToken');
      }
    }

    function showTokenValue(id) {
      const token = adminTokens.find(t => String(t.id) === String(id));
      if (!token?.token) { showTokenMessage(t('tokenUnavailable')); return; }
      showTokenOutput(token.token);
    }

    function showTokenOutput(value) {
      const output = document.getElementById('token-output');
      output.innerHTML = `<div class="token-output-row"><code class="token-output-code">${escHtml(value)}</code><button class="btn-token" type="button" onclick="copyTokenValue('${escAttr(value)}')"><i class="ti ti-copy"></i><span>${t('copyToken')}</span></button></div>`;
      output.classList.add('open');
    }

    function showTokenMessage(message) {
      const output = document.getElementById('token-output');
      output.textContent = message;
      output.classList.add('open');
    }

    async function copyTokenValue(value) {
      try {
        await navigator.clipboard.writeText(value);
        showTokenMessage(t('tokenCopied'));
      } catch {
        showTokenOutput(value);
      }
    }

    async function revokeToken(id) {
      if (!id) return;
      try {
        const res = await fetch(`${WORKER_URL}/admin/tokens/${encodeURIComponent(id)}/revoke`, {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ revoked: true })
        });
        if (!res.ok) throw new Error(t('serverError', res.status));
        showTokenMessage(t('tokenRevoked'));
        await loadTokens();
      } catch (e) {
        alert(e.message || t('somethingWrongShort'));
      }
    }

    async function reindexNamespace() {
      const btn = document.getElementById('reindex-btn');
      btn.disabled = true;
      btn.querySelector('span').textContent = t('reindexing');
      try {
        const res = await fetch(`${WORKER_URL}/admin/reindex`, {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify(withNamespace({}))
        });
        if (!res.ok) throw new Error(t('serverError', res.status));
        showTokenMessage(t('reindexStarted'));
      } catch (e) {
        alert(e.message || t('somethingWrongShort'));
      } finally {
        btn.disabled = false;
        btn.querySelector('span').textContent = t('reindex');
      }
    }

    function formatDateTime(value) {
      try { return new Date(value).toLocaleString(t('locale'), { dateStyle: 'medium', timeStyle: 'short' }); } catch { return value; }
    }

    function openMenu() { document.getElementById('menu-sheet').classList.add('open'); }
    function closeMenu() { document.getElementById('menu-sheet').classList.remove('open'); }

    function openView(entry, cardElement) {
      document.getElementById('view-content-text').textContent = entry.content;
      const tagsContainer = document.getElementById('view-tags-container');
      tagsContainer.innerHTML = '';
      if (entry.tags && entry.tags.length > 0) {
        tagsContainer.innerHTML = entry.tags.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join('');
      }
      const appendBtn = document.getElementById('view-btn-append');
      if (entry.id) {
        appendBtn.onclick = () => { closeView(); openAppend(entry.id, entry.content.slice(0, 80)); };
      } else {
        appendBtn.onclick = () => { closeView(); openAppendFromContent(entry.content); };
      }
      const forgetBtn = document.getElementById('view-btn-forget');
      if (entry.id) {
        forgetBtn.onclick = () => { closeView(); openConfirm(entry.id, cardElement || null); };
        forgetBtn.style.display = 'flex';
      } else {
        forgetBtn.style.display = 'none';
      }
      document.getElementById('view-sheet').classList.add('open');
    }
    function closeView() { document.getElementById('view-sheet').classList.remove('open'); }

    document.getElementById('confirm-dialog').addEventListener('click', e => { if (e.target === document.getElementById('confirm-dialog')) closeConfirm(); });
    document.getElementById('append-sheet').addEventListener('click', e => { if (e.target === document.getElementById('append-sheet')) closeAppend(); });
    document.getElementById('menu-sheet').addEventListener('click', e => { if (e.target === document.getElementById('menu-sheet')) closeMenu(); });
    document.getElementById('view-sheet').addEventListener('click', e => { if (e.target === document.getElementById('view-sheet')) closeView(); });
    document.getElementById('token-sheet').addEventListener('click', e => { if (e.target === document.getElementById('token-sheet')) e.stopPropagation(); });

    function appendBrainBubble(container, text) {
      const row = document.createElement('div');
      row.className = 'bubble-row brain';
      row.innerHTML = `<div class="bubble brain">${escHtml(text)}</div>`;
      container.appendChild(row);
    }
    function appendUserBubble(container, text) {
      const row = document.createElement('div');
      row.className = 'bubble-row user';
      const time = new Date().toLocaleTimeString(t('locale'), { hour: 'numeric', minute: '2-digit' });
      row.innerHTML = `<div><div class="bubble user">${escHtml(text)}</div><div class="bubble-time">${time}</div></div>`;
      container.appendChild(row);
    }
    function appendLoading(container) {
      const row = document.createElement('div');
      row.className = 'bubble-row brain';
      row.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`;
      container.appendChild(row);
      return row;
    }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }
    function clearRemember() {
      const msgs = document.getElementById('remember-messages');
      msgs.innerHTML = `<div class="bubble-row brain"><div class="bubble brain">${t('rememberWelcome')}</div></div>`;
      document.getElementById('remember-clear-btn').style.display = 'none';
    }
    function clearRecall() {
      const msgs = document.getElementById('recall-messages');
      msgs.innerHTML = `<div class="brain-cards-wrapper" id="recall-welcome"><div class="bubble brain">${t('recallWelcome')}</div></div>`;
      document.getElementById('recall-clear-btn').style.display = 'none';
    }
    function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function escAttr(s) { return String(s).replace(/'/g, "\\'").replace(/\n/g, ' ').slice(0, 100); }

    init();
  </script>
</body>

</html>
